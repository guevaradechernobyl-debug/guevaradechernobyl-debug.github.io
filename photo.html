<script>
const viewer = document.getElementById("viewer");
const viewerContent = document.getElementById("viewerContent");
const closeViewer = document.getElementById("closeViewer");

document.querySelectorAll(".media-item").forEach(item => {
  item.addEventListener("click", () => {
    viewerContent.innerHTML = "";

    if (item.tagName === "IMG") {
      const img = document.createElement("img");
      img.src = item.src;
      viewerContent.appendChild(img);
    } else if (item.tagName === "VIDEO") {
      const vid = document.createElement("video");
      vid.src = item.src;
      vid.controls = true;
      vid.autoplay = true;
      viewerContent.appendChild(vid);
    }

    viewer.classList.add("show");
  });
});

closeViewer.addEventListener("click", () => {
  viewer.classList.remove("show");
  viewerContent.innerHTML = "";
});
</script>
<script>
const container = document.querySelector(".leaves-container");

// Your 3 leaf images
const leafImages = [
  "leaf1-removebg-preview.png",
  "leaf2-removebg-preview.png",
  "leaf4.gif"
];

function createLeaf() {
  const leaf = document.createElement("img");

  // Random leaf type
  leaf.src = leafImages[Math.floor(Math.random() * leafImages.length)];
  leaf.classList.add("leaf");

  // Random horizontal start
  leaf.style.left = Math.random() * 100 + "vw";

  // Random size
  const size = 25 + Math.random() * 35;
  leaf.style.width = size + "px";

  // Random fall duration (slower = more aesthetic)
  const duration = 6 + Math.random() * 6;
  leaf.style.animationDuration = duration + "s";

  // Slight random horizontal drift
  const drift = (Math.random() - 0.5) * 200;
  leaf.style.setProperty("--drift", drift + "px");

  container.appendChild(leaf);

  // Remove after animation ends
  setTimeout(() => {
    leaf.remove();
  }, duration * 1000);
}

// Spawn rate (lower = more leaves)
setInterval(createLeaf, 700);
</script>
<script>
const modal = document.getElementById("mediaModal");
const modalContent = document.querySelector(".media-content");
const closeBtn = document.querySelector(".media-close");

// Click on images or videos inside frames
document.querySelectorAll(".frame img, .frame video").forEach(media => {
  media.addEventListener("click", () => {

    modalContent.innerHTML = "";

    if (media.tagName === "IMG") {
      const img = document.createElement("img");
      img.src = media.src;
      modalContent.appendChild(img);

    } else if (media.tagName === "VIDEO") {
      const video = document.createElement("video");
      video.src = media.src;
      video.controls = true;
      video.autoplay = true;
      video.muted = false;
      video.playsInline = true;

      modalContent.appendChild(video);
    }

    modal.style.display = "flex";
  });
});

// Close modal
closeBtn.addEventListener("click", () => {
  modal.style.display = "none";
  modalContent.innerHTML = "";
});

// Optional: click outside content to close
modal.addEventListener("click", (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
    modalContent.innerHTML = "";
  }
});</script>
