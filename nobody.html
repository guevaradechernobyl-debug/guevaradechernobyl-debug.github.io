<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Where Am I?</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* GIF */
.bg-gif {
  position: fixed;
  inset: 0;
  margin: auto;
  max-width: 100vw;
  max-height: 100vh;
  width: auto;
  height: auto;
  transition: opacity 0.6s ease;
}

.bg-gif.fade-out {
  opacity: 0;
}

/* Modal */
.pixel-modal {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.pixel-modal.show {
  opacity: 1;
  pointer-events: all;
}

/* Pixel UI */
.pixel-box {
  font-family: 'Press Start 2P', cursive;
  background: black;
  color: white;
  padding: 30px;
  border: 4px solid white;
  text-align: center;
  animation: glitch 0.2s infinite;
}

.pixel-box button {
  margin-top: 20px;
  font-family: 'Press Start 2P', cursive;
  background: white;
  color: black;
  border: none;
  padding: 10px 20px;
  cursor: pointer;
}

.pixel-box button:hover {
  background: red;
  color: white;
}

/* Glitch */
@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-1px,1px); }
  80% { transform: translate(1px,0); }
  100% { transform: translate(0); }
}
</style>
</head>

<body>

<body>

<img id="bgGif" src="Butnobodycame.gif" class="bg-gif" />

<!-- Pixel Modal -->
<div id="pixelModal" class="pixel-modal">
  <div class="pixel-box">
    <p>Dead-End 404</p>
    <button id="closeBtn">Okay</button>
  </div>
</div>

<script>
const gif = document.getElementById("bgGif");
const modal = document.getElementById("pixelModal");
const closeBtn = document.getElementById("closeBtn");

// 4.5 seconds
setTimeout(() => {
  // Fade GIF out
  gif.classList.add("fade-out");

  // After fade finishes, show modal
  setTimeout(() => {
    modal.classList.add("show");
  }, 700); // match fade duration

}, 7500);

closeBtn.addEventListener("click", () => {
  window.location.replace("index.html");
});
</script>

</body>

</body>
</html>
