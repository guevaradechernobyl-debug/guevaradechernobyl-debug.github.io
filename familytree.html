<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steven — Family Tree</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050510;
  color:#ffffff;
  font-family:'Press Start 2P', monospace;
  overflow-x:hidden;
}

/* VIDEO BG */
.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-5;
}

/* ================= PANEL ================= */

.site-wrapper{
  max-width:1100px;
  margin:100px auto;
  padding:20px;
  display:flex;
  justify-content:center;
}

.pixel-panel{
 background:rgba(8, 10, 30, 0.55);
  border:3px solid #00ff99;
  padding:60px 40px;
  width:100%;
  max-width:850px;
  position:relative;
  border-radius:12px;

  box-shadow:
    0 0 25px #00ff99,
    inset 0 0 40px rgba(0,255,153,.15);
}

/* glowing outer frame effect */
.pixel-panel::before{
  content:"";
  position:absolute;
  inset:-6px;
  border:2px solid #ff00aa;
  pointer-events:none;
  border-radius:12px;
}

/* ================= TITLE ================= */

.pixel-title{
  text-align:center;
  font-size:18px;
  margin-bottom:70px;
  color:#ffffff;

  text-shadow:
    0 0 8px #00ffff,
    0 0 20px #00ff99;
}

/* ================= TREE ================= */

.tree-level{
  display:flex;
  justify-content:center;
  gap:60px;
  margin-bottom:70px;
  flex-wrap:wrap;
}

.member{
  font-size:9px;
  padding:18px 22px;
  border:2px solid #ffffff;
  background:#0d1130;
  cursor:pointer;
  transition:.25s ease;
  position:relative;
}

.member:hover{
  border-color:#ff00aa;
  box-shadow:
    0 0 15px #ff00aa,
    0 0 25px #00ffff;
  transform:translateY(-4px);
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(5,5,20,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:#0d1130;
  border:3px solid #00ff99;
  padding:30px;
  max-width:500px;
  width:90%;
  text-align:center;
  position:relative;

  box-shadow:0 0 30px #00ff99;
}

.modal-content h3{
  margin-bottom:20px;
  color:#00ffff;
}

.modal-content img{
  width:100%;
  max-height:300px;
  object-fit:cover;
  margin-bottom:20px;
  border:2px solid #ffffff;
}

.modal-content p{
  font-family:'Inter', sans-serif;
  font-size:14px;
  color:#ccccff;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:16px;
  color:#ff00aa;
}

footer{
  margin-top:60px;
  text-align:center;
  font-size:10px;
  opacity:.6;
  font-family:'Inter', sans-serif;
  color:#ccccff;
}
/* ================= TREE CONNECTION LINES ================= */

/* vertical line from YOU to parents */
.tree-level:nth-child(2){
  position:relative;
}

.tree-level:nth-child(2)::before{
  content:"";
  position:absolute;
  top:-40px;
  left:50%;
  width:2px;
  height:40px;
  background:#00ff99;
  transform:translateX(-50%);
  box-shadow:0 0 6px #00ff99;
}

/* horizontal line connecting parents */
.tree-level:nth-child(2)::after{
  content:"";
  position:absolute;
  top:-40px;
  left:25%;
  width:50%;
  height:2px;
  background:#00ff99;
  box-shadow:0 0 6px #00ff99;
}

/* vertical lines from parents to grandparents */
/* ================= CONNECTOR SYSTEM ================= */

.connector{
  position:relative;
  height:60px;
  margin:0 auto;
  width:80%;
}

.connector-top::before{
  content:"";
  position:absolute;
  top:0;
  left:50%;
  width:2px;
  height:30px;
  background:#00ff99;
  transform:translateX(-50%);
  box-shadow:0 0 8px #00ff99;
}

.connector-top::after{
  content:"";
  position:absolute;
  top:30px;
  left:0;
  width:100%;
  height:2px;
  background:#00ff99;
  box-shadow:0 0 8px #00ff99;
}

/* vertical lines from horizontal bar to each child */
.children{
  position:relative;
}

.children .member{
  position:relative;
}

.children .member::before{
  content:"";
  position:absolute;
  top:-30px;
  left:50%;
  width:2px;
  height:30px;
  background:#00ff99;
  transform:translateX(-50%);
  box-shadow:0 0 6px #00ff99;
}
/* ================= GLITCH HOVER ================= */

@keyframes glitch {
  0% { transform:translate(0); }
  20% { transform:translate(-1px,1px); }
  40% { transform:translate(1px,-1px); }
  60% { transform:translate(-1px,0); }
  80% { transform:translate(1px,1px); }
  100% { transform:translate(0); }
}

.member:hover{
  animation:glitch .25s infinite;
}

/* RGB shadow flicker */
.member:hover::after{
  content:attr(data-name);
  position:absolute;
  inset:0;
  color:#ff00aa;
  opacity:.15;
  pointer-events:none;
}
.highlight-you{
  border-color:#00ffff;
  box-shadow:0 0 15px #00ffff;
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="hurrahh.mp4" type="video/mp4">
</video>

<div class="site-wrapper">
<div class="pixel-panel">

<div class="pixel-title">
FAMILY TREE
</div>

<!-- PARENTS -->
<div class="tree-level parents">
  <div class="member">PARENT</div>
  <div class="member">PARENT</div>
</div>

<!-- CONNECTOR -->
<div class="connector connector-top"></div>

<!-- CHILDREN -->
<div class="tree-level children">
  <div class="member">CHILD</div>
  <div class="member">CHILD</div>
  <div class="member highlight-you">YOU</div>
  <div class="member">CHILD</div>
  <div class="member">CHILD</div>
</div>

<footer>
Design inspired by retro pixel UI aesthetics.
</footer>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-btn" id="closeBtn">✕</span>
    <h3 id="modalName"></h3>
    <img id="modalImg" src="">
    <p id="modalDesc"></p>
  </div>
</div>

<!-- ================= FAMILY TREE SCRIPT ================= -->
<script>
const members = document.querySelectorAll('.member');
const modal = document.getElementById('modal');
const modalName = document.getElementById('modalName');
const modalImg = document.getElementById('modalImg');
const modalDesc = document.getElementById('modalDesc');
const closeBtn = document.getElementById('closeBtn');

members.forEach(member => {
  member.addEventListener('click', () => {
    modal.style.display = "flex";
    modalName.textContent = member.dataset.name;
    modalImg.src = member.dataset.img;
    modalDesc.textContent = member.dataset.desc;
  });
});

closeBtn.addEventListener('click', () => {
  modal.style.display = "none";
});

modal.addEventListener('click', (e) => {
  if(e.target === modal){
    modal.style.display = "none";
  }
});
</script>

</body>
</html>
